name: MERGE_GATE

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  release-gate:
    name: Workflow and release gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 2

      - name: Check workflow YAML syntax
        run: ruby -e "require 'yaml'; Dir['.github/workflows/*.{yml,yaml}'].each { |file| YAML.parse_file(file) }; puts 'PASS workflow YAML syntax'"

      - name: Check release scripts syntax
        run: node --check scripts/release/verify-release-ref.mjs && node --check scripts/validate/check_release_gate.mjs && node --check scripts/validate/test_release_gate.mjs

      - name: Check production release gate wiring
        run: node scripts/validate/check_release_gate.mjs

      - name: Test production release reference gate
        run: node scripts/validate/test_release_gate.mjs
