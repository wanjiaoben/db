name: DB Workers Atomic Release

on:
  workflow_dispatch:
    inputs:
      release_ref:
        description: "Annotated worker-prod-* tag"
        required: false
        type: string
  push:
    tags:
      - "worker-prod-*"

permissions:
  contents: read

concurrency:
  group: db-workers-atomic-release-production
  cancel-in-progress: false

jobs:
  release:
    name: Verify tag, then deploy both Workers
    runs-on: ubuntu-latest
    environment:
      name: production-worker
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.release_ref || github.sha }}

      - name: Verify annotated tag, main, and Wan approval
        id: release-ref
        env:
          DB_RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.release_ref || github.ref_name }}
        run: node scripts/release/verify-release-ref.mjs

      - name: Require Cloudflare deploy secret
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: test -n "${CLOUDFLARE_API_TOKEN}"

      - name: Deploy nice-analytics
        working-directory: analytics-worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: npx --yes wrangler@4.112.0 deploy --config wrangler.toml

      - name: Deploy db-private
        working-directory: private-worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: npx --yes wrangler@4.112.0 deploy --config wrangler.toml
