<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nice Okinawa Analytics</title>
<style>
:root {
  --bg: #f6f4ef;
  --panel: #fffefa;
  --ink: #1d2520;
  --muted: #647067;
  --line: #ddd6c8;
  --green: #0f8b64;
  --blue: #2b6b9f;
  --red: #b94c4c;
  --gold: #a7792a;
}
* { box-sizing: border-box; }
body {
  margin: 0;
  background: var(--bg);
  color: var(--ink);
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}
header {
  position: sticky;
  top: 0;
  z-index: 10;
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 10px;
  padding: 10px 14px;
  background: rgba(246, 244, 239, 0.92);
  border-bottom: 1px solid var(--line);
  backdrop-filter: blur(16px);
}
h1 {
  margin: 0;
  font-size: 16px;
  letter-spacing: 0.04em;
}
.sub {
  margin-top: 2px;
  color: var(--muted);
  font-size: 11px;
}
.controls {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
  justify-content: flex-end;
}
button, input, select {
  height: 30px;
  border: 1px solid var(--line);
  background: var(--panel);
  color: var(--ink);
  border-radius: 5px;
  padding: 0 8px;
  font: inherit;
}
button {
  cursor: pointer;
  background: var(--ink);
  color: white;
  border-color: var(--ink);
}
td button {
  height: auto;
  padding: 0;
  border: 0;
  background: transparent;
  color: var(--blue);
  text-align: left;
}
main {
  display: grid;
  grid-template-columns: 1fr;
  gap: 8px;
  max-width: none;
  margin: 0;
  padding: 8px;
}
.grid {
  display: grid;
  gap: 8px;
}
.metrics {
  grid-column: 1 / -1;
}
.error {
  grid-column: 1 / -1;
}
.card {
  background: var(--panel);
  border: 1px solid var(--line);
  border-radius: 6px;
  padding: 9px;
  min-width: 0;
  max-height: 64vh;
  overflow: auto;
}
h2 {
  position: sticky;
  top: -9px;
  z-index: 1;
  margin: -9px -9px 6px;
  padding: 8px 9px 5px;
  background: var(--panel);
  border-bottom: 1px solid #ece6da;
  font-size: 13px;
}
table {
  width: 100%;
  border-collapse: collapse;
  font-size: 12px;
}
th, td {
  padding: 6px 8px;
  border-bottom: 1px solid #ece6da;
  text-align: left;
  vertical-align: top;
}
th {
  position: sticky;
  top: 0;
  z-index: 2;
  background: var(--panel);
  color: var(--muted);
  font-weight: 600;
}
tr:hover td { background: #fbf7ee; }
td.num, th.num { text-align: right; }
.bar {
  height: 6px;
  background: #e8e0d3;
  border-radius: 999px;
  overflow: hidden;
  margin-top: 6px;
}
.bar span {
  display: block;
  height: 100%;
  background: var(--green);
}
.pill {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  border: 1px solid var(--line);
  border-radius: 999px;
  padding: 3px 7px;
  color: var(--muted);
  font-size: 11px;
}
.dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: var(--green);
}
.muted { color: var(--muted); }
.error {
  display: none;
  margin: 0;
  padding: 8px 10px;
  border: 1px solid #e0b5b5;
  background: #fff4f4;
  color: var(--red);
  border-radius: 8px;
}
.empty {
  color: var(--muted);
  font-size: 11px;
  padding: 6px 0;
}
@media (max-width: 980px) {
  header { align-items: flex-start; flex-direction: column; }
  .controls { justify-content: flex-start; }
  main { grid-template-columns: 1fr; }
  .card { max-height: none; }
}
</style>
<meta name="robots" content="noindex,nofollow">
</head>
<body>
<header>
  <div>
    <h1>Nice Okinawa Analytics</h1>
    <div class="sub">translation.nice.okinawa 实时访问、来源、页面、停留与联系按钮</div>
  </div>
  <div class="controls">
    <span class="pill"><span class="dot"></span><span id="status">等待连接</span></span>
    <select id="days">
      <option value="1">最近 1 天</option>
      <option value="7" selected>最近 7 天</option>
      <option value="30">最近 30 天</option>
      <option value="90">最近 90 天</option>
    </select>
    <select id="siteFilter">
      <option value="">全部站点</option>
    </select>
    <select id="pageFilter">
      <option value="">全部页面</option>
    </select>
    <input id="key" type="password" placeholder="Dashboard key">
    <button id="saveKey">保存</button>
    <button id="refresh">刷新</button>
  </div>
</header>

<main>
  <div class="error" id="error"></div>

  <section class="card metrics">
    <table>
      <thead><tr><th>实时在线</th><th>今日访问</th><th>区间访问</th><th>访客</th><th>平均停留</th><th>平均滚动</th></tr></thead>
      <tbody><tr><td id="online">-</td><td id="todayViews">-</td><td id="views">-</td><td id="visitors">-</td><td id="duration">-</td><td id="scroll">-</td></tr></tbody>
    </table>
  </section>

  <section class="card">
    <h2>页面总表</h2>
    <table>
      <thead><tr><th>站点</th><th>页面</th><th class="num">访问</th><th class="num">Session</th><th class="num">访客</th><th>主来源</th><th>语言</th><th class="num">联系</th><th class="num">停留</th><th class="num">滚动</th></tr></thead>
      <tbody id="pageTable"></tbody>
    </table>
  </section>

  <section class="card">
    <h2>实时日志</h2>
    <table><thead><tr><th>时间</th><th>站点</th><th>事件</th><th>页面</th><th>来源</th><th>细节</th></tr></thead><tbody id="recent"></tbody></table>
  </section>

</main>

<script>
const API = 'https://analytics.nice.okinawa/summary';
const $ = (id) => document.getElementById(id);
const fmt = new Intl.NumberFormat('ja-JP');
let selectedSite = '';
let selectedPage = '';

const hash = new URLSearchParams((location.hash || '').replace(/^#/, ''));
if (hash.get('key')) {
  localStorage.setItem('nice_dashboard_key', hash.get('key'));
  history.replaceState(null, '', location.pathname + location.search);
}

function n(value) {
  return fmt.format(Number(value || 0));
}

function seconds(ms) {
  const value = Number(ms || 0);
  if (!value) return '-';
  const sec = Math.round(value / 1000);
  if (sec < 60) return sec + 's';
  return Math.floor(sec / 60) + 'm ' + (sec % 60) + 's';
}

function row(cells) {
  return '<tr>' + cells.map((cell) => '<td' + (cell.num ? ' class="num"' : '') + '>' + (cell.html ?? cell) + '</td>').join('') + '</tr>';
}

function escapeHtml(value) {
  return String(value ?? '').replace(/[&<>"']/g, (s) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[s]));
}

function renderRows(id, rows, mapper) {
  const body = $(id);
  if (!rows || !rows.length) {
    body.innerHTML = '<tr><td colspan="4" class="empty">暂无数据</td></tr>';
    return;
  }
  body.innerHTML = rows.map(mapper).join('');
}

function updateSiteOptions(sites) {
  const current = $('siteFilter').value || selectedSite;
  const known = new Set(['']);
  const options = ['<option value="">全部站点</option>'];
  (sites || []).forEach((site) => {
    const name = site.site || '';
    if (!name || known.has(name)) return;
    known.add(name);
    options.push('<option value="' + escapeHtml(name) + '">' + escapeHtml(name) + '</option>');
  });
  $('siteFilter').innerHTML = options.join('');
  $('siteFilter').value = known.has(current) ? current : '';
  selectedSite = $('siteFilter').value;
}

function updatePageOptions(pages) {
  const current = $('pageFilter').value || selectedPage;
  const known = new Set(['']);
  const options = ['<option value="">全部页面</option>'];
  (pages || []).forEach((page) => {
    const path = page.path || '/';
    if (known.has(path)) return;
    known.add(path);
    options.push('<option value="' + escapeHtml(path) + '">' + escapeHtml(path) + '</option>');
  });
  $('pageFilter').innerHTML = options.join('');
  $('pageFilter').value = known.has(current) ? current : '';
  selectedPage = $('pageFilter').value;
}

async function load() {
  $('error').style.display = 'none';
  $('status').textContent = '连接中';
  const key = localStorage.getItem('nice_dashboard_key') || '';
  const days = $('days').value || '7';
  const site = $('siteFilter').value || '';
  const path = $('pageFilter').value || '';
  const qs = new URLSearchParams({ days });
  if (site) qs.set('site', site);
  if (path) qs.set('path', path);
  try {
    const res = await fetch(API + '?' + qs.toString(), {
      headers: key ? { 'x-dashboard-key': key } : {}
    });
    const data = await res.json();
    if (!res.ok || !data.ok) throw new Error(data.error || 'API 请求失败');
    const totals = data.totals || {};
    const today = data.today || {};
    $('online').textContent = n(data.online);
    $('todayViews').textContent = n(today.page_views);
    $('views').textContent = n(totals.page_views);
    $('visitors').textContent = n(totals.visitors);
    $('duration').textContent = seconds(totals.avg_duration_ms);
    $('scroll').textContent = totals.avg_scroll ? Math.round(totals.avg_scroll) + '%' : '-';
    $('status').textContent = (site ? site + ' · ' : '') + (path ? path + ' · ' : '') + '已更新 ' + new Date(data.generated_at).toLocaleTimeString();
    updateSiteOptions(data.sites);
    updatePageOptions(data.pages);

    renderRows('pageTable', data.page_rows, (r) => row([
      '<button type="button" data-site="' + escapeHtml(r.site || '') + '">' + escapeHtml(r.site || '-') + '</button>',
      '<button type="button" data-path="' + escapeHtml(r.path || '/') + '">' + escapeHtml(r.path || '/') + '</button>',
      { html: n(r.views), num: true },
      { html: n(r.sessions), num: true },
      { html: n(r.visitors), num: true },
      escapeHtml(r.top_source || '-'),
      escapeHtml(r.top_lang || '-'),
      { html: n(r.contact_clicks), num: true },
      { html: seconds(r.avg_duration_ms), num: true },
      { html: r.avg_scroll ? Math.round(r.avg_scroll) + '%' : '-', num: true }
    ]));
    renderRows('recent', data.recent, (r) => row([
      escapeHtml(new Date(r.created_at).toLocaleTimeString()),
      escapeHtml(r.site || '-'),
      escapeHtml(r.type || '-'),
      escapeHtml(r.path || '-'),
      escapeHtml(r.source || '-'),
      escapeHtml(r.event_name || r.section || (r.max_scroll ? 'scroll ' + r.max_scroll + '%' : ''))
    ]));
  } catch (e) {
    $('status').textContent = '连接失败';
    $('error').textContent = e.message === 'unauthorized'
      ? 'unauthorized。右上角 Dashboard key 没有保存，或保存的是旧 key。请重新粘贴最新 key 后点保存。'
      : e.message + '。确认 Worker 已部署，DASHBOARD_KEY 正确。';
    $('error').style.display = 'block';
  }
}

$('saveKey').addEventListener('click', () => {
  localStorage.setItem('nice_dashboard_key', $('key').value);
  load();
});
$('refresh').addEventListener('click', load);
$('days').addEventListener('change', load);
$('siteFilter').addEventListener('change', () => {
  selectedSite = $('siteFilter').value;
  $('pageFilter').value = '';
  selectedPage = '';
  load();
});
$('pageFilter').addEventListener('change', () => {
  selectedPage = $('pageFilter').value;
  load();
});
$('pageTable').addEventListener('click', (event) => {
  const button = event.target.closest('button[data-path]');
  const siteButton = event.target.closest('button[data-site]');
  if (siteButton) {
    $('siteFilter').value = siteButton.dataset.site;
    selectedSite = siteButton.dataset.site;
    $('pageFilter').value = '';
    selectedPage = '';
    load();
    return;
  }
  if (!button) return;
  const rowSite = event.target.closest('tr')?.querySelector('button[data-site]')?.dataset.site || '';
  if (rowSite) {
    $('siteFilter').value = rowSite;
    selectedSite = rowSite;
  }
  $('pageFilter').value = button.dataset.path;
  selectedPage = button.dataset.path;
  load();
});
$('key').value = localStorage.getItem('nice_dashboard_key') || '';
load();
setInterval(load, 30000);
</script>
</body>
</html>
